
  <div class="content-component component-signature">
    <div class="mdl-grid">
      <div class="container-button col">
        <button class="button" @click="start" :class="{ 'inative': isActive }">
          <span>colher</span>
        </button>
        <button class="button" @click="save" :class="{ 'inative': !isActive }">
          <span>salvar</span>
        </button>
      </div>
      <div class="container-button col">
        <button class="button" @click="clear">
          <span>limpar</span>
        </button>
      </div>
      <div class="ajsute-layout-legado"></div>
    </div>
    <div class="scroll-ativo" :class="{ 'inative': isActive }"></div>
    <div id="canvas">
      <canvas class="roundCorners signature" id="newSignature" 
        height="265"
        style="border: 1px solid #c4caac;width:100%"></canvas>
    </div>
  </div>

<script>
    var pixels = [];
    var xyLast = {};
    var calculate = false;
    var xyAddLast = {};
    var cpixels = [];
    var disableSave = true;


    function start () {
      this.isActive = true
      signatureCapture()
      // this.$refs.signaturePad.openSignaturePad()
    }

    function save () {
      
      //const {isEmpty, data} = this.$refs.signaturePad.saveSignature()
      var canvas = document.getElementById("newSignature");// save canvas image as data url (png format by default)
      var dataUrl = canvas.toDataURL("image/png");
      //document.getElementById("saveSignature").src = dataURL;
      if (dataUrl) {
        this.$emit('input', dataUrl)
      }
      this.isActive = false
    }

    function clear () {
      //this.$refs.signaturePad.clearSignature()
      var canvas = document.getElementById("newSignature");
      var context = canvas.getContext("2d");
      context.clearRect(0, 0, canvas.width, canvas.height);
      this.$emit('input', '')
    }
    
    function signatureCapture() {
      var canvas = document.getElementById("newSignature");
      var context = canvas.getContext("2d");
      context.canvas.width  = window.innerWidth;

      context.fillStyle = "#fff";
      context.strokeStyle = "#444";
      context.lineWidth = 2;
      context.lineCap = "round";
      //context.fillRect(0, 0, canvas.width, canvas.height);
      
      canvas.addEventListener('touchstart', on_mousedown, false);
      canvas.addEventListener('mousedown', on_mousedown, false);
    }

    function remove_event_listeners() {
      var canvas = document.getElementById("newSignature");
      var context = canvas.getContext("2d");
      canvas.removeEventListener('mousemove', on_mousemove, false);
      canvas.removeEventListener('mouseup', on_mouseup, false);
      canvas.removeEventListener('touchmove', on_mousemove, false);
      canvas.removeEventListener('touchend', on_mouseup, false);

      document.body.removeEventListener('mouseup', on_mouseup, false);
      document.body.removeEventListener('touchend', on_mouseup, false);
    }

    function get_coords(e) {
      var x, y;
      
      if (e.changedTouches && e.changedTouches[0]) {
          var bounds = canvas.getBoundingClientRect();
          x = e.pageX - bounds.left - scrollX;
          y = e.pageY - bounds.top - scrollY;
          x /=  bounds.width; 
          y /=  bounds.height; 
          x *= canvas.width;
          y *= canvas.height

          var offsety = canvas.offsetTop || 0;
          var offsetx = canvas.offsetLeft || 0;

          // x = e.changedTouches[0].pageX - bounds.left - offsetx;
          // y = e.changedTouches[0].pageY - bounds.top - offsety;
          x = e.changedTouches[0].pageX - bounds.left;
          y = e.changedTouches[0].pageY - bounds.top;

      } else if (e.layerX || 0 == e.layerX) {
          x = e.layerX;
          y = e.layerY;
      } else if (e.offsetX || 0 == e.offsetX) {
          x = e.offsetX;
          y = e.offsetY;
      }

      return { x : x, y : y };
    };

    function on_mousedown(e) {
    
      var canvas = document.getElementById("newSignature");
      var context = canvas.getContext("2d");
      //e.preventDefault();
      if (e.cancelable) {
      e.preventDefault();
      }
      e.stopPropagation();

      canvas.addEventListener('mouseup', on_mouseup, false);
      canvas.addEventListener('mousemove', on_mousemove, false);
      canvas.addEventListener('touchend', on_mouseup, false);
      canvas.addEventListener('touchmove', on_mousemove, false);

      document.body.addEventListener('mouseup', on_mouseup, false);
      document.body.addEventListener('touchend', on_mouseup, false);

      //empty = false;
      var xy = get_coords(e);
      context.beginPath();
      pixels.push('moveStart');
      context.moveTo(xy.x, xy.y);
      pixels.push(xy.x, xy.y);
      xyLast = xy;
    }

    function on_mousemove(e, finish) {
      
      var canvas = document.getElementById("newSignature");
      var context = canvas.getContext("2d");
      //e.preventDefault();
      if (e.cancelable) {
          e.preventDefault();
      }
      e.stopPropagation();

      
      // context.moveTo(0, 0);
      // context.lineTo(200, 100);
      // context.stroke();

      var xy = get_coords(e);
      var xyAdd = {
          x : (xyLast.x + xy.x) / 2,
          y : (xyLast.y + xy.y) / 2
      }

      if (calculate) {
          var xLast = (xyAddLast.x + xyLast.x + xyAdd.x) / 3;
          var yLast = (xyAddLast.y + xyLast.y + xyAdd.y) / 3;
          pixels.push(xLast, yLast);
      } else {
          calculate = true;
      }

      context.quadraticCurveTo(xyLast.x, xyLast.y, xyAdd.x, xyAdd.y);
      pixels.push(xyAdd.x, xyAdd.y);
      context.stroke();
      context.beginPath();
      context.moveTo(xyAdd.x, xyAdd.y);
      xyAddLast = xyAdd;
      xyLast = xy;

    }

    function on_mouseup(e) {
      var canvas = document.getElementById("newSignature");
      var context = canvas.getContext("2d");
      remove_event_listeners();
      disableSave = false;
      context.stroke();
      pixels.push('e');
      calculate = false;
    }

    function signatureSave() {
      var canvas = document.getElementById("newSignature");// save canvas image as data url (png format by default)
      var dataURL = canvas.toDataURL("image/png");
      document.getElementById("saveSignature").src = dataURL;
    }


    /*
    
    // Restaura imagem pela retorno de dataURL
    var img = new Image()
      img.onload = function () {
        this.context.drawImage(img, 0, 0)
        // Or at whatever offset you like
      }.bind(this)
      img.src = canvas.toDataURL("image/png")
    
    */
</script>
