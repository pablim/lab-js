<html>
    <head>
		<meta charset="utf-8" />
		<title>Página HTML</title>
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/public/libs/@pablovaz/tables/css/table.css">
        <link rel="stylesheet" href="/public/libs/@pablovaz/tables/css/scrolled-table.css">
        <script type="module">
            import { fakerPT_BR as faker } from "https://esm.sh/@faker-js/faker";

            const tables = document.getElementsByTagName("table")
            const tbody = document.createElement("tbody");

            Array.from({ length: 6 }, (_, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${index+1}</td>
                        <td>${faker.person.fullName()}</td>
                        <td>${faker.number.int({ min: 18, max: 60 })}</td>
                        <td>${faker.internet.email()}</td>
                    </tr>
                `
            })

            tables[0].appendChild(tbody)
            tables[1].appendChild(tbody.cloneNode(true))
        </script>
	</head>
<body>  
    <table class="scrolled-table responsive">
        <thead>
            <tr>
                <th>Id</th>
                <th>Name and last name</th>
                <th>Idade</th>
                <th>E-mail</th>
            </tr>
        </thead>
    </table>  
  
    <br>
    <br>
  
	<div class="scrolled-container" >
		<table class="scrolled-table">
			<thead>
                <tr>
                    <th>Id</th>
                    <th>Name and last name</th>
                    <th>Idade</th>
                    <th>E-mail</th>
                </tr>
			</thead>
		</table> 
	</div>
</body>  
</html>
