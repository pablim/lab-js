<!DOCTYPE html>

<html lang="pt-br">
	<head>

		<meta charset="utf-8">

		<!--
			Um smartphone é capaz de apresentar toda a página web da mesma 
			forma que um computador. Por isso, cada navegador define uma 
			largura inicial beseada em pixels de referência (por volta de 800px 
			de referência). A consequência disso é quando acessamos uma 
			aplicação não responsiva por meio de um navegador de smartphone 
			veremos uma apresentação muito pequena da aplicação. Desse modo, 
			precisamos fazer um zoom da página para que possamos visualizar o 
			conteúdo nitidamente. Além disso para vermos todo o conteúdo da 
			página, precisaremos fazer tanto a rolagem horizontal quanto a 
			rolagem vertical. E isso é um grave problema de usuabilidade.

			Para ajustar a janela de visualização, para que contenha uma 
			quantidade pixels de referência que seja possível ler o texto e ver 
			as imagens com clareza, é utilizada a tag meta:

			<meta name="viewport" content="width=320">

			Podemos definir a largura em função da largura de qualquer 
			dispositivo:

			<meta name="viewport" content="width=device-width" />
		-->
		<meta name="viewport" content="width=device-width" />

		<title></title>

		<script type="text/javascript" src=""></script>
		<style type="text/css"></style>

	</head>
	<body>
		
		<h1>Conteúdo</h1>

		<!--
			Referências:

			Puc Minas Virtual - Pós Graduação - Desenvolvimento de Sistemas Web. 
			Prof. Marcos André S. Kutova.
		-->
	</body>
</html>
