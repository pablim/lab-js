<!DOCTYPE html>

<html lang="pt-br">
	<head>

		<meta charset="utf-8">

		<title>Localização</title>

		<link type="text/css" rel="stylesheet" href="/css/estilos.css" />

		<script type="text/javascript" src="../../src/jquery-1.11.1.js"></script>
		<script type="text/javascript" src="../../src/alunos.js"></script>

		<!-- API google -->
		<script src="http://maps.google.com/maps/api/js?sensor=false"></script>

		<script type="text/javascript">

			// Irá armazenar a posição atual do usuário.
			var latitude, longitude;
			var map;

			var infoWindow = new google.maps.InfoWindow();

			// Pega a posição atual do usuário;
			function getLocation() {
				if (navigator.geolocation) {
					return navigator.geolocation.getCurrentPosition(showPosition,showError);
				} else { 
					alert("A geolocalização não é suportada por este navegador.");
				}
			}

			function showPosition(position) {
				latitude = position.coords.latitude;
				longitude = position.coords.longitude;

				// Gera o marcador do usuário.
				latlonUsuario = new google.maps.LatLng(latitude, longitude);
				var marker = new google.maps.Marker({position:latlonUsuario,
					map:map, animation:google.maps.Animation.BOUNCE,
					title:"Você está aqui!"});
			}

			function showError(error) {
				switch(error.code) {
					case error.PERMISSION_DENIED:
						x.innerHTML = "User denied the request for Geolocation."
						break;
					case error.POSITION_UNAVAILABLE:
						x.innerHTML = "Location information is unavailable."
						break;
					case error.TIMEOUT:
						x.innerHTML = "The request to get user location timed out."
						break;
					case error.UNKNOWN_ERROR:
						x.innerHTML = "An unknown error occurred."
						break;
				}
			}

			function mapa() {

				// Pega a posição atual do usuário;
				getLocation();

				// Localização de Pablo Vaz.
				lat = alunos[0].latitude;
				lon = alunos[0].longitude;
				latlon = new google.maps.LatLng(lat, lon);

				/* 
					Ponto para centralização do mapa: -8.295394, -55.289877 
					(Brasil - Latitude e Longitude).
				*/
				latlonCentro = new google.maps.LatLng(-8.295394, -55.289877);

				mapholder = document.getElementById('mapholder');

				// Opções de configuração do mapa.
				var myOptions={
					center:latlonCentro,zoom:4,
					mapTypeId:google.maps.MapTypeId.ROADMAP,  //ROADMAP (normal, default 2D map)
					//mapTypeId:google.maps.MapTypeId.SATELLITE, //SATELLITE (photographic map)
					//mapTypeId:google.maps.MapTypeId.HYBRID //HYBRID (photographic map + roads and city names)
					//mapTypeId:google.maps.MapTypeId.TERRAIN //TERRAIN (map with mountains, rivers, etc.)
					mapTypeControl:true, // Libera escolher os tipos de mapa
					navigationControlOptions:{style:google.maps.NavigationControlStyle.SMALL}
				}
		
				/* 
					Instância do mapa. É passado o elemento onde o mapa será 
					renderizado e as opções do mapa.
				*/
				//var map = new google.maps.Map(document.getElementById("mapholder"),myOptions);
				map = new google.maps.Map(document.getElementById("mapholder"),myOptions);

				// Marcador simples
				//var marker = new google.maps.Marker({position:latlon,map:map,title:"Pablo Vaz Gondim Faria"});
				
				// O marcador fica saltando
				/*
				var marker = new google.maps.Marker({position:latlonCentro,
					map:map, animation:google.maps.Animation.BOUNCE,
					title:"Pablo Vaz Gondim Faria"}); 
				*/

				// Marcador com imagem				
				var marker = new google.maps.Marker({position:latlon,
					map:map, 
					icon:"/assets/imagens/imagens_alunos/pablo2.png",
					title:"Pablo Vaz Gondim Faria"});

				// Círculo
				/*
				var circulo = new google.maps.Circle({center:latlonCentro,
					radius: 20000, strokeColor: "#0000FF", strokeOpacity:0.8,
					strokeWeight:2, fillColor:"#0000FF", fillOpacity:0.4}); 

				circulo.setMap(map);
				*/

				// Janela de informação no marcador
				/*
				var marker = new google.maps.Marker({position:latlonCentro,map:map,title:"Pablo Vaz Gondim Faria"});
				var infoWindow = new google.maps.InfoWindow({content:"olap"});
				infoWindow.open(map, marker);
				*/

				// Abrir janela de informação quando clicar no marcador
				/*
				var marker = new google.maps.Marker({position:latlonCentro,map:map,title:"Pablo Vaz Gondim Faria"});
				var infoWindow = new google.maps.InfoWindow({content:"olap"});
				google.maps.event.addListener(marker, 'click', function() {
					infoWindow.open(map,marker);
				});
				*/


				// Marca a posição dos alunos no mapa.
				for (var i = 1; i < alunos.length; i++) {
					/*lat = alunos[i].latitude;
					lon = alunos[i].longitude;
					latlon = new google.maps.LatLng(lat, lon);
					var marker = new google.maps.Marker({position:latlon,map:map,title:i+1 + " - " + alunos[i].nome});
					infoWindow.setContent(alunos[i].nome);
					google.maps.event.addListener(marker, 'click', function() {
						infoWindow.open(map, marker);
					});*/
					geraMarcadores(alunos[i].latitude, alunos[i].longitude, i, alunos[i].nome, alunos[i].imagem);
				}
			}

			/* 
				Foi preciso gerar os marcadores de fora do laço de repetição. 
				De alguma forma a infoWindow não é gerada para para todos os 
				marcadores. 
			*/
			function geraMarcadores(lat, lon, i, nome, imagem) {
				latlon = new google.maps.LatLng(lat, lon);
				console.log(imagem);
				
				var marker = new google.maps.Marker({
					position:latlon,
					map:map,
					icon:"/assets/imagens/imagens_alunos/" + imagem,
					title:i+1 + " - " + nome
				});
				google.maps.event.addListener(marker, 'click', function() {
					infoWindow.setContent(i+1+" - "+nome);
					infoWindow.open(map, marker);
				});
			}

			// Preenche a tabela com as informações dos alunos.
			function tabela() {
				var linhas = " <colgroup> " +
					"<col id=\"numero\">" + 
					"<col id=\"foto\">" +
					"<col id=\"nome\">" +
					"</colgroup>";

				for (var i = 0; i < alunos.length; i++) {
					linhas += "<tr><td>" + alunos[i].id + "</td>" 
						+ "<td><img class=\"mini\" src=\"/assets/imagens/imagens_alunos/" + alunos[i].imagem +"\"</td>" 
						+ "<td>" 
						+ "<div class=\"info\">"
						+ "<div class=\"nomes\">" + alunos[i].nome + "</div>"
						+ "<div class=\"cidades\">" + alunos[i].cidade + " - " 
						+ alunos[i].estado +  "</div>"
						+ "</div>" // Fim div.info
						+ "</td>" ;
				}

				document.getElementById("tabela").innerHTML = linhas;
			}

			// Gera os dados para um novo objeto alunos.
			function dados() {
				var a = alunos;
				var stringAlunos = JSON.stringify(a);
				document.getElementById("dados").innerHTML = stringAlunos;
				document.getElementById("dados").style = "box-shadow: 0 -2px 8px blue;"
			}

			// Adiciona um novo aluno.
			function adicionar() {

				var nome = document.getElementById("nomeCad").value;
				var localizacao = document.getElementById("cidadeCad").value;
				
				document.getElementById("nomeCad").value = "";
				document.getElementById("cidadeCad").value = "";

				localizacao = localizacao.split(",");
				var cidade = localizacao[0];
				var estado = localizacao[1];
				alert(nome +" - "+ cidade + " - " + estado);

				// Api do google para localização geocode.
				//var url = "http://maps.googleapis.com/maps/api/geocode/json?address=formiga,+minas+gerais&sensor=false";
				var url = "http://maps.googleapis.com/maps/api/geocode/json?address="+cidade+",+"+estado+"&sensor=false";

				var latitude;
				var longitude;
				// Obtem e trata os dados em JSON
				$.getJSON( url, function( data ) {

					var resultados = data.results[0];
		
					//resultados.formatted_address;
					//alert(data.results[0].address_components[0].long_name);
					/*
					alert("Cidade: " + resultados.formatted_address + "\n" + 
							"Latitude: " + resultados.geometry.location.lat + 
							"\nLongitude: " + resultados.geometry.location.lng);
					*/
					
					var imagem = nome.replace(/ /g, "_");
					imagem = imagem.toLowerCase();

					var icone = nome.replace(/ /g, "_");
					icone = imagem.toLowerCase();

					alunos.push({
						"id":alunos.length+1, 
						"nome":nome,
						"cidade": cidade, 
						"estado": estado,
					    "latitude": resultados.geometry.location.lat,
						"longitude": resultados.geometry.location.lng,
						"imagem": imagem + ".jpg",
						"icone": icone + ".ico"
					});

					mapa();
					tabela();
				});
			}
		</script>

	</head>
	<body onload="mapa(); tabela(); ">

		<div id="container">
			<div id="acoes">
				<div id="campos">
					<p>
						Após adicionar uma pessoa em uma localização os dados 
						serão inseridos no mapa e em um array de onde 
						inicialmente são carregados os dados no mapa. Ao clicar 
						no botão Gerar Dados os dados dos alunos serão 
						mostrados na tela em formato JSON. 
					</p>
					<button onclick="dados()">Gerar Dados</button>
				</div>
				<div id="add">
					<input type="image" src="/assets/imagens/iconeadd3.jpg" onclick="adicionar()" />
					<input type="text" id="nomeCad" class="" placeholder="Nome" />
					<input type="text" id="cidadeCad" class="" placeholder="Cidade, Estado" />
				</div>

			</div>

			<div id="containerTabela">
				<table id="tabela"></table>
			</div>

		</div>
		<div id="mapholder" ></div>
		<div id="dados"></div>
	</body>
</html>
