<!DOCTYPE html PUBLIC "-//w3c//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
	<head>
		<style type="text/css">
			body{
				font-family: Verdana, Arail, Helvetica, sans-serif;
			}

			h1 {
				font-size: 16pt;
				color: #000000;
				text-align: center;
				font-weight: bold;
				border-top: 1px solid #000000;
				border-bottom: 1px solid #000000;
				margin-bottom: 20px;
			}

			ul{
				margin: 0;
				padding: 0;
				list-style: none;
			}

			li{
				display: inline;
			}

			a {
				float: left;
				font-size: 10pt;
				font-weight: bold;
				color: #ffffff;
				margin: 0 4px 0 4px;
				padding: 5px;
				background-color: #8f8f8f;
				border: 2px solid #000000;
				text-decoration: none; 
			}

			a:hover{
				color: #000000;
				background-color: #ffffff;
				border: 1px solid #8f8f8f;
			}
		</style>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<title>Exemplo de menu horizontal com lista</title>
	</head>
	<body>
		<h1>Exemplo de menu horizontal com lista</h1> <br>
		<ul>
			<li><a href="">Primeira opção</a></li>
			<li><a href="">Segunda opção</a></li>
			<li><a href="">Terceira opção</a></li>
			<li><a href="">Quarta opção</a></li>
			<li><a href="">Quinta opção</a></li>
			<li><a href="">Sexta opção</a></li>
		</ul>
		<br><br>
		<hr>
	</body>
</html>
