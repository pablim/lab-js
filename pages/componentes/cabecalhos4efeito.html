<!DOCTYPE html PUBLIC "-//w3c//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
	<head>
		<meta http-equiv="Content-Type" content="text/xhtml; charset=UTF-8" />
		<style type="text/css">
			h1{
				font-family: Verdana, Arial, Helvetica, sans-serif;
				font-size: 25pt;
				color: #000000;
				background: #ffffff url(valid-css.gif) no-repeat left center;
				text-align: center;
				padding-left: 10px;
				border-top: 2px solid #c2c2c2;
				border-bottom: 2px solid #c2c2c2;
			}

			h2{
				font-family: Verdana, Arial, Helvetica, sans-serif;
				font-size: 22pt;
				color: #000000;
				background: #ffffff url(valid-css.gif) no-repeat right center;
				margin-top: 5px;
				margin-bottom: 10px;
				border-top: 2px dotted #c2c2c2;
				border-bottom: 2px dotted #c2c2c2;
			}

			h3{
				font-family: Verdana, Arial, Helvetica, sans-serif;
				font-size: 18pt;
				color: #000000;
				background: #ffffff url(ponto.gif) repeat left top;
				text-align: center;
				width: 25%;
				border: 1px solid #c2c2c2;
				margin-top: 5px;
				margin-bottom: 5px;
			}

			h4{
				font-family: Verdana, Arial, Helvetica, sans-serif;
				font-size: 15pt;
				color: #000000;
				background: #ffffff url(marca.gif) repeat-x center bottom;
				width: 25%;
				text-align: center;
				padding-bottom: 5px;
				position: static;
				float: right;
			}

			h5{
				font-family: Verdana, Arial, Helvetica, sans-serif;
				font-size: 12pt;
				color: #000000;
				background: #ffffff url(marca.gif) repeat-x left top;
				width: 25%;
				text-align: center;
				padding-top: 5px;
				position: absolute;
				left: 35%;
			}

		</style>		
		<title>4º efeito - imagens, tipos de borda e posicionamento.</title>	
	</head>
	<body>
		<h1>Cabeçalho 1</h1><br /><br />
		<h2>Cabeçalho 2</h2><br /><br />
		<h3>Cabeçalho 3</h3><br /><br />
		<h4>Cabeçalho 4</h4><br /><br />
		<h5>Cabeçalho 5</h5><br /><br />
	</body>
</html>
