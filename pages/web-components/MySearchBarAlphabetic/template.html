<template id="my-search-bar-alphabetic">
    <link rel="stylesheet" type="text/css" href="MySearchBarAlphabetic/style.css">
    
    <div class="container">
        <div class="char tooltip " data-letter="A"  onclick="scrollLista(this)">
            A <div class="tooltiptext">A</div>
        </div>
        <div class="char tooltip " data-letter="B"  onclick="scrollLista(this)">
            B <div class="tooltiptext">B</div>
        </div>
        <div class="char tooltip " data-letter="C"  onclick="scrollLista(this)">
            C <div class="tooltiptext">C</div>
        </div>
    </div>
    <div class="clear"></div>
</template>
