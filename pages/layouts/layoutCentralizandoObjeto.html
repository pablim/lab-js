<!DOCTYPE html PUBLIC "-//w3c//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
	<head>
		<style type="text/css">
			body{
				font-family: Verdana, Arail, Helvetica, sans-serif;
			}

			h1 {
				font-size: 16pt;
				font-weight: bold;
				color: #000000;
				text-align: center;
				border-top: 1px solid #000000;
				border-bottom: 1px solid #000000;
				margin-bottom: 20px;
			}

			img#centro {
				position: absolute;
				left: 50%;
				top: 50%;
				width: 296px;
				height: 198px;
				margin-left: -148px; /*metade da largura.*/
				margin-top: -99px; /*metade da altura*/
			}
			
		</style>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<title>Exemplo de menu vertical com lista</title>
	</head>
	<body>
		<h1>Exemplo de Layout (centralizando qualquer objeto)</h1> <br>
		<img id="centro" src="foto.jpg" width="296" height="198" />
		<br>
	</body>
</html>
