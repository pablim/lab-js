<html lang="pt-br">
<head>
<meta charset="utf-8" />
<title>Livro CSS3 do Maujor</title>
<style>
div.b { width:500px; height:250px; margin:20px; border:1px solid black;
background-image: url(/assets/imagens/triangulo-css3.png), url(/assets/imagens/circulo-css3.png), url(/assets/imagens/retangulo-css3.png);
background-repeat: repeat-x, no-repeat, repeat-y;

}


div.a { width:500px; height:250px; margin:20px; border:10px solid black;;

url(/assets/imagens/circulo-css3.png) no-repeat center,
url(/assets/imagens/retangulo-css3.png) repeat-y 0 0 #eee;

}





</style>
</head>
<body>
	<div class="b"></div>

	<div class="a"></div>
