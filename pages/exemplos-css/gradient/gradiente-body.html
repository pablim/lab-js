<!DOCTYPE html>

<html lang="pt-br">
	<head>

		<meta charset="utf-8"> 
		<title>Gradiente aplicado ao elemento body</title>

		<style type="text/css">

			html {
				/*
					É necessário aumentar o tamanho do html para que o 
					gradiente aplicado ao body fique com a aparecencia normal.
				*/
				height: 100%;
			}

			body {
				background-image: linear-gradient(black, white);
				/*background-image: radial-gradient(circle, black, white, blue, red, green, yellow, silver, purple, brown);*/
			}

		</style>

	</head>
	<body>

	</body>
</html>
