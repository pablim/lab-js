<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout Exemple</title>
    <style>
        .grid-layout {
            display: grid;
            grid-template-columns: auto auto auto;
            grid-template-rows: 100px 100px 100px;
        }

        .grid-layout2{
            display: grid;
            grid-template-areas: 
                'header header header header header header'
                'menu main main main right right'
                'menu footer footer footer footer footer';
        }

        .grid-item1 {
            grid-area: header;
        }
        .grid-item2 {
            grid-area: menu;
        }
        .grid-item3 {
            grid-area: main;
        }
        .grid-item4 {
            grid-area: right;
        }
        .grid-item5 {
            grid-area: footer;
        }
    </style>
</head>
<body>
    <div class="grid-layout">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
        <div class="grid-item">7</div>
        <div class="grid-item">8</div>
        <div class="grid-item">9</div>
    </div>

    <div class="grid-layout2">
        <div class="grid-item1">Header</div>
        <div class="grid-item2">Menu</div>
        <div class="grid-item3">Main</div>
        <div class="grid-item4">Sider</div>
        <div class="grid-item5">Footer</div>
    </div>
</body>
</html>
