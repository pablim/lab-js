<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>

    <style>

      div {
        width: 200px;
        height: 160px;
        background-color: lightblue;
      }

      .container {
        display: grid;
        grid-template-columns: auto auto auto auto;
        background-color: #2196F3;
        padding: 10px;

        /* grid-column-gap: 40px; */
        /* grid-row-gap: 20px; */
        grid-gap : 30px;
      }

      .item1 {
        grid-column-start: 1;
        grid-column-end: 3;
      }

    </style>

  </head>
  <body>

    <div id="" class="container">

      <div id="" class="item1">1</div>
      <div id="" class="">2</div>
      <div id="" class="">3</div>
      <div id="" class="">4</div>
      <div id="" class="">5</div>
      <div id="" class="">6</div>
      <div id="" class="">7</div>
      <div id="" class="">8</div>
    </div>

  </body>
</html>
